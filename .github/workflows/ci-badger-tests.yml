name: ci-badger-tests

on:
  workflow_dispatch: # allows manual trigger from GitHub
  pull_request:
    branches:
      - main
      - release/v*

permissions:
  contents: read

jobs:
  # Detect whether any non-doc files changed. The required jobs below always run
  # so they report a status on every PR, then short-circuit to success when only
  # docs changed. This keeps the test gate for code PRs while preventing
  # docs-only PRs from deadlocking on a check that paths filtering would skip.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'
              - '!images/**'
              - '!contrib/**'

  cross-compile:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: aix
            goarch: ppc64
          - goos: plan9
            goarch: amd64
    steps:
      - uses: actions/checkout@v5
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Cross-compile for ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...

  badger-tests:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@v5
      - if: needs.changes.outputs.code == 'true'
        name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - if: needs.changes.outputs.code == 'true'
        name: Install Dependencies
        run: make dependency
      - if: needs.changes.outputs.code == 'true'
        name: Run Badger Tests
        run: make test
